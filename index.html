<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heztio — Simplifying Building Life</title>
    <meta name="description" content="Heztio is the smart building management platform that simplifies every aspect of building life for administrators, residents, and communities.">
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="theme-color" content="#0c1828" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #333;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.2s ease-out;
        }

        .logo {
            width: 350px;
            margin-bottom: 2rem;
        }

        .coming-soon {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fd9892;
            margin-bottom: 1.5rem;
            background: rgba(253, 152, 146, 0.1);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d2d2d;
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        h1 span {
            color: #fd9892;
        }

        .tagline {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #fd9892;
            margin: 0 auto 2.5rem;
            border-radius: 2px;
        }

        .contact {
            font-size: 0.9rem;
            color: #999;
        }

        .contact a {
            color: #fd9892;
            text-decoration: none;
            font-weight: 500;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8rem;
            color: #bbb;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo { width: 250px; }
            h1 { font-size: 1.6rem; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-full.png" alt="Heztio" class="logo">
        <div class="coming-soon">Coming Soon</div>
        <h1>Smart building management, <span>simplified.</span></h1>
        <p class="tagline">
            One platform for administrators, residents, and communities —
            making every aspect of building life effortless.
        </p>
        <div class="divider"></div>
        <p class="contact">Get in touch: <a href="mailto:info@heztio.com">info@heztio.com</a></p>
    </div>
    <footer>&copy; 2026 Heztio. All rights reserved.</footer>
</body>
</html>
